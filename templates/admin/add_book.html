{% extends "base.html" %}
{% block title %}Add Book - Library MS{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add New Book</h2>
    <a href="{{ url_for('admin.books') }}" class="btn btn-secondary">← Back to Books</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('admin.add_book') }}" novalidate>

        <div class="form-group">
            <label for="title">Book Title *</label>
            <input type="text" id="title" name="title" placeholder="e.g. Introduction to Python"
                   required maxlength="200">
        </div>

        <div class="form-group">
            <label for="author">Author *</label>
            <input type="text" id="author" name="author" placeholder="e.g. Mark Lutz"
                   required maxlength="150">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Literature">Literature</option>
                    <option value="History">History</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Business">Business</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="copies">Number of Copies *</label>
                <input type="number" id="copies" name="copies" value="1" min="1" max="100" required>
            </div>
        </div>

        <div class="form-group">
            <label for="isbn">ISBN <span class="optional">(optional)</span></label>
            <input type="text" id="isbn" name="isbn" placeholder="e.g. 978-3-16-148410-0"
                   maxlength="50">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Book</button>
            <a href="{{ url_for('admin.books') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
