{% extends "base.html" %}
{% block title %}Edit Book - Library MS{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Edit Book</h2>
    <a href="{{ url_for('admin.books') }}" class="btn btn-secondary">← Back to Books</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('admin.edit_book', book_id=book.id) }}" novalidate>

        <div class="form-group">
            <label for="title">Book Title *</label>
            <input type="text" id="title" name="title" value="{{ book.title }}"
                   required maxlength="200">
        </div>

        <div class="form-group">
            <label for="author">Author *</label>
            <input type="text" id="author" name="author" value="{{ book.author }}"
                   required maxlength="150">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    {% for cat in ['Computer Science', 'Mathematics', 'Physics', 'Chemistry',
                                   'Biology', 'Literature', 'History', 'Engineering', 'Business', 'Other'] %}
                    <option value="{{ cat }}" {% if book.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="copies">Number of Copies *</label>
                <input type="number" id="copies" name="copies" value="{{ book.total_copies }}"
                       min="1" max="100" required>
            </div>
        </div>

        <div class="form-group">
            <label for="isbn">ISBN <span class="optional">(optional)</span></label>
            <input type="text" id="isbn" name="isbn" value="{{ book.isbn or '' }}" maxlength="50">
        </div>

        <!-- Show current availability info -->
        <div class="info-box">
            <strong>Currently:</strong> {{ book.available_copies }} of {{ book.total_copies }} copies available
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('admin.books') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
